<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teatro Teleprompter — Auto da Compadecida</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08091a;
    --surface: #0f1225;
    --surface2: #161930;
    --accent: #ff8c42;
    --accent2: #ff6b35;
    --text: #f0e6d3;
    --text-dim: #8a7d6e;
    --border: rgba(255,140,66,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── DESKTOP LAYOUT ── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: rgba(8,9,26,0.97);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 17px; font-weight: 900; color: var(--accent);
  }
  .logo span { color: var(--text-dim); font-weight: 400; font-size: 11px; display: block; letter-spacing: 2px; text-transform: uppercase; }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
  }

  /* ── SIDEBAR (desktop only) ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 20px;
    overflow-y: auto;
    max-height: calc(100vh - 53px);
    position: sticky; top: 53px;
  }
  .section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 10px;
  }
  .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .char-btn {
    padding: 7px 5px; border-radius: 7px; border: 2px solid transparent;
    background: var(--surface2); color: var(--text-dim);
    font-size: 11px; font-weight: 600; cursor: pointer; text-align: center;
    transition: all 0.2s; line-height: 1.2;
  }
  .char-btn:hover { border-color: var(--accent); color: var(--text); }
  .char-btn.active { color: #1a1a1a; font-weight: 700; border-color: rgba(255,255,255,0.3); }

  .btn {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 6px; transition: all 0.18s;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #1a1a1a; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-mic { background: #1a3a5c; color: var(--text); border: 1px solid #2c5f8d; }
  .btn-mic.active { background: #5c1a1a; border-color: #ff6b35; }
  .btn-row { display: flex; gap: 8px; }

  input[type=range] {
    flex: 1; height: 4px; border-radius: 2px; appearance: none;
    background: linear-gradient(to right, var(--accent), var(--accent2));
    outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    appearance: none; width: 15px; height: 15px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
  }
  .font-label { font-size: 12px; color: var(--accent); font-weight: 700; min-width: 34px; text-align: right; }
  .font-control { display: flex; align-items: center; gap: 8px; }

  .progress-bar { background: var(--surface2); border-radius: 4px; height: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.3s; border-radius: 4px; }
  .progress-text { font-size: 11px; color: var(--text-dim); margin-top: 5px; text-align: center; }

  .improv-input-row { display: flex; gap: 6px; }
  .improv-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
  }
  .improv-input:focus { border-color: var(--accent); }
  .improv-input::placeholder { color: var(--text-dim); }
  .improv-list { display: flex; flex-direction: column; gap: 6px; max-height: 130px; overflow-y: auto; }
  .improv-item {
    background: rgba(255,140,66,0.08); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; font-size: 12px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 6px;
  }
  .improv-del { background: none; border: none; color: #ff6b35; cursor: pointer; font-size: 16px; opacity: 0.7; }
  .improv-del:hover { opacity: 1; }

  /* ── STAGE ── */
  .stage {
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center;
    padding: 32px 32px 120px;
    min-height: calc(100vh - 53px);
  }
  .teleprompter-card {
    width: 100%; max-width: 860px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 48px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .char-name {
    font-family: 'Playfair Display', serif;
    font-weight: 900; text-transform: uppercase; letter-spacing: 4px;
    margin-bottom: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 6px rgba(255,140,66,0.3));
  }
  .line-text {
    line-height: 2.1; color: var(--text);
    padding: 28px 36px;
    background: rgba(255,140,66,0.04);
    border-radius: 12px;
    border: 1px solid rgba(255,140,66,0.1);
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
    min-height: 100px;
  }
  .line-text .word { display: inline-block; margin-right: 10px; margin-bottom: 4px; transition: all 0.2s; }
  .line-text .word.hl {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a1a1a; padding: 3px 8px; border-radius: 5px;
    font-weight: 900; transform: scale(1.05);
    box-shadow: 0 3px 10px rgba(255,107,53,0.4);
  }
  .stage-note {
    margin-top: 20px; padding: 12px 18px;
    background: rgba(255,140,66,0.05);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-style: italic; color: #c8a880;
  }
  .transcript-bar {
    margin-top: 16px; padding: 12px 18px;
    background: rgba(44,95,141,0.2); border: 1px solid #2c5f8d;
    border-radius: 10px; font-size: 13px;
  }
  .transcript-bar strong { color: var(--accent); }
  .empty-state { text-align: center; color: var(--text-dim); font-size: 18px; opacity: 0.6; margin-top: 60px; }

  /* ── MOBILE BOTTOM BAR — sempre visível ── */
  .mobile-nav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: rgba(8,9,26,0.97);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    flex-direction: column; gap: 8px;
  }

  /* faixa de personagens deslizável */
  .char-scroll {
    display: flex; gap: 6px;
    overflow-x: auto; padding-bottom: 2px;
    scrollbar-width: none;
  }
  .char-scroll::-webkit-scrollbar { display: none; }
  .char-pill {
    flex-shrink: 0;
    padding: 5px 12px; border-radius: 20px;
    border: 2px solid transparent;
    background: var(--surface2); color: var(--text-dim);
    font-size: 12px; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: all 0.18s;
  }
  .char-pill.active { color: #1a1a1a; font-weight: 700; border-color: rgba(255,255,255,0.3); }

  /* botões de nav grandes */
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn {
    flex: 1; padding: 14px; border-radius: 10px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all 0.18s; -webkit-tap-highlight-color: transparent;
  }
  .nav-btn-prev { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .nav-btn-prev:disabled { opacity: 0.3; }
  .nav-btn-next { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #1a1a1a; font-size: 18px; }
  .nav-btn-next:disabled { opacity: 0.3; }
  .nav-btn-mic { background: #1a3a5c; color: var(--text); border: 1px solid #2c5f8d; flex: 0; padding: 14px 18px; }
  .nav-btn-mic.active { background: #5c1a1a; border-color: #ff6b35; }

  /* kbd hint */
  .kbd-hint { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 4px; }
  kbd { background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 4px; font-size: 10px; }

  /* status */
  .status-bar {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    padding: 8px 20px; border-radius: 30px; font-size: 13px; font-weight: 600;
    display: none; align-items: center; gap: 6px;
    backdrop-filter: blur(12px); z-index: 300;
  }
  .status-bar.listening { display: flex; background: rgba(44,95,141,0.9); border: 1px solid #2c5f8d; color: #a0c4e8; }
  .status-bar.error { display: flex; background: rgba(92,26,26,0.9); border: 1px solid #ff6b35; color: #ff8c42; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    main { grid-template-columns: 1fr; }
    .mobile-nav { display: flex; }
    .stage { padding: 16px 12px 200px; min-height: calc(100vh - 53px); }
    .teleprompter-card { padding: 24px 20px; border-radius: 14px; }
    header { padding: 12px 16px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">🎭 Teatro Teleprompter <span>Auto da Compadecida</span></div>
  </header>

  <main>
    <!-- SIDEBAR DESKTOP -->
    <div class="sidebar">
      <div>
        <div class="section-title">👤 Personagem</div>
        <div class="char-grid" id="charGrid"></div>
      </div>
      <div>
        <div class="section-title">⚙️ Navegação</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="btn-row">
            <button class="btn btn-primary" id="btnPrev" onclick="prevLine()">▲ Anterior</button>
            <button class="btn btn-primary" id="btnNext" onclick="nextLine()">▼ Próxima</button>
          </div>
          <div class="btn-row">
            <button class="btn btn-mic" id="btnMic" onclick="toggleMic()">🎤 Escutar</button>
            <button class="btn btn-secondary" onclick="resetScript()">↺ Reset</button>
          </div>
          <div class="kbd-hint"><kbd>←</kbd> anterior · <kbd>→</kbd> próxima · <kbd>Space</kbd> mic</div>
        </div>
      </div>
      <div>
        <div class="section-title">📊 Progresso</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="progress-text" id="progressText">0 / 0</div>
      </div>
      <div>
        <div class="section-title">🔤 Tamanho</div>
        <div class="font-control">
          <input type="range" min="24" max="64" value="40" id="fontRange" oninput="changeFontSize(this.value)">
          <div class="font-label" id="fontLabel">40px</div>
        </div>
      </div>
      <div>
        <div class="section-title">🎭 Improvisações</div>
        <div class="improv-input-row">
          <input type="text" class="improv-input" id="improvInput" placeholder="Nova fala...">
          <button class="btn btn-primary" style="flex:0;padding:8px 12px" onclick="addImprov()">+</button>
        </div>
        <div class="improv-list" id="improvList">
          <div style="font-size:12px;color:var(--text-dim);text-align:center;margin-top:6px">Nenhuma improvisação</div>
        </div>
      </div>
    </div>

    <!-- STAGE -->
    <div class="stage">
      <div class="teleprompter-card" id="card">
        <div class="empty-state">Selecione um personagem para começar</div>
      </div>
    </div>
  </main>

  <!-- MOBILE NAV — sempre visível no celular -->
  <div class="mobile-nav">
    <!-- faixa de personagens -->
    <div class="char-scroll" id="charScroll"></div>
    <!-- botões grandes -->
    <div class="nav-btns">
      <button class="nav-btn nav-btn-prev" id="mBtnPrev" onclick="prevLine()">◀ Anterior</button>
      <button class="nav-btn nav-btn-next" id="mBtnNext" onclick="nextLine()">Próxima ▶</button>
      <button class="nav-btn nav-btn-mic" id="mBtnMic" onclick="toggleMic()">🎤</button>
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <div class="status-dot"></div>
  <span id="statusText">🎤 Escutando...</span>
</div>

<script>
const characters = [
  {id:"jovem1",name:"JOVEM 1",displayName:"Jovem 1",color:"#FF6B6B"},
  {id:"jovem2",name:"JOVEM 2",displayName:"Jovem 2",color:"#4ECDC4"},
  {id:"jovem3",name:"JOVEM 3",displayName:"Jovem 3",color:"#FFE66D"},
  {id:"jovem4",name:"JOVEM 4",displayName:"Jovem 4",color:"#95E1D3"},
  {id:"jovem5",name:"JOVEM 5",displayName:"Jovem 5",color:"#C7CEEA"},
  {id:"bibliotecario",name:"BIBLIOTECÁRIO",displayName:"Bibliotecário",color:"#B19CD9"},
  {id:"joao",name:"JOÃO GRILO",displayName:"João Grilo",color:"#C85A17"},
  {id:"chico",name:"CHICÓ",displayName:"Chicó",color:"#E8D4B8"},
  {id:"encourado",name:"ENCOURADO",displayName:"Encourado",color:"#722F37"},
  {id:"jesus",name:"JESUS",displayName:"Jesus",color:"#F5E6D3"},
  {id:"maria",name:"MARIA",displayName:"Maria",color:"#2C5F8D"},
  {id:"narrador",name:"NARRADOR",displayName:"Narrador",color:"#A0A0A0"},
  {id:"todos",name:"TODOS",displayName:"Todos",color:"#666666"}
];

const scriptLines = [
  {id:"1-1-1",character:"JOVEM 1",text:"Gente… pelo amor de Deus… alguém tem internet?",act:1,scene:1},
  {id:"1-1-2",character:"JOVEM 2",text:"A minha acabou no meio do vídeo!",act:1,scene:1},
  {id:"1-1-3",character:"JOVEM 3",text:"Eu tava quase zerando minha série…",act:1,scene:1},
  {id:"1-1-4",character:"JOVEM 4",text:"Calma, calma!\nMeu primo falou que aqui tem Wi-Fi grátis.",act:1,scene:1},
  {id:"1-1-5",character:"TODOS",text:"(Todos param e olham em volta.)",act:1,scene:1,notes:"Ação cênica"},
  {id:"1-1-6",character:"JOVEM 5",text:"Peraí…\nIsso aqui é uma biblioteca MESMO?",act:1,scene:1},
  {id:"1-1-7",character:"JOVEM 2",text:"Achei que biblioteca nem existia mais.",act:1,scene:1},
  {id:"1-1-8",character:"JOVEM 1",text:"Achei que era coisa de filme antigo.",act:1,scene:1},
  {id:"1-1-9",character:"JOVEM 3",text:"Ou lugar de castigo de escola.",act:1,scene:1},
  {id:"1-1-10",character:"TODOS",text:"(Todos riem.)",act:1,scene:1,notes:"Ação cênica"},
  {id:"1-1-11",character:"JOVEM 4",text:"Nossa, olha o tanto de livro…",act:1,scene:1},
  {id:"1-1-12",character:"JOVEM 5",text:"E ninguém pegando.",act:1,scene:1},
  {id:"1-1-13",character:"JOVEM 2",text:"Porque ninguém lê mais, né.",act:1,scene:1},
  {id:"1-1-14",character:"JOVEM 1",text:"Hoje em dia o povo vê resumo no TikTok.",act:1,scene:1},
  {id:"1-1-15",character:"JOVEM 3",text:"Eu só leio legenda de série.",act:1,scene:1},
  {id:"1-1-16",character:"JOVEM 4",text:"Mentira.\nVocê nem lê legenda. Assiste tudo dublado.",act:1,scene:1},
  {id:"1-1-17",character:"TODOS",text:"(Risos.)",act:1,scene:1,notes:"Ação cênica"},
  {id:"1-1-18",character:"JOVEM 5",text:"Imagina vir aqui por vontade própria…",act:1,scene:1},
  {id:"1-1-19",character:"JOVEM 2",text:"Você entra e automaticamente sente vontade de cochilar.",act:1,scene:1},
  {id:"1-1-20",character:"TODOS",text:"(Eles sentam espalhados procurando sinal.)",act:1,scene:1,notes:"Ação cênica"},

  {id:"1-1-23",character:"TODOS",text:"Nãããão…",act:1,scene:1},
  {id:"1-1-24",character:"JOVEM 3",text:"Isso já é humilhação.",act:1,scene:1},
  {id:"1-1-25",character:"TODOS",text:"(O bibliotecário aparece silenciosamente atrás deles segurando um livro.)",act:1,scene:1,notes:"Ação cênica"},
  {id:"1-1-26",character:"BIBLIOTECÁRIO",text:"A humilhação maior é entrar numa biblioteca e fingir que os livros são invisíveis.",act:1,scene:1},
  {id:"1-1-27",character:"TODOS",text:"(Os jovens se assustam.)",act:1,scene:1,notes:"Ação cênica"},
  {id:"1-1-28",character:"JOVEM 2",text:"Meu Deus!\nVocê brotou do além!",act:1,scene:1},
  {id:"1-1-29",character:"JOVEM 5",text:"NPC de biblioteca.",act:1,scene:1},
  {id:"1-1-30",character:"BIBLIOTECÁRIO",text:"Interessante…\nVocês conseguem passar horas olhando uma tela…\nMas cinco segundos perto de um livro já causa sofrimento.",act:1,scene:1},
  {id:"1-1-31",character:"JOVEM 1",text:"Não é sofrimento…\nÉ costume.",act:1,scene:1},
  {id:"1-1-32",character:"JOVEM 3",text:"Livro parece sempre coisa de prova.",act:1,scene:1},
  {id:"1-1-33",character:"JOVEM 4",text:"Ou trabalho da escola.",act:1,scene:1},
  {id:"1-1-34",character:"JOVEM 2",text:"Ou aqueles textos enormes que ninguém entende.",act:1,scene:1},

  {id:"1-1-48",character:"BIBLIOTECÁRIO",text:"Esse mesmo.",act:1,scene:1},

  {id:"1-1-50",character:"BIBLIOTECÁRIO",text:"Comédia, crítica social, religião, Nordeste brasileiro… tudo junto.",act:1,scene:1},

  {id:"1-1-52",character:"BIBLIOTECÁRIO",text:"Tanto funciona…\nQue até hoje as pessoas continuam assistindo, lendo e montando essa peça.",act:1,scene:1},

  {id:"2-1-101",character:"TODOS",text:"(Luzes se apagam.)",act:2,scene:1,notes:"Ação cênica"}
];

let selectedCharId = "joao";
let currentIdx = 0;
let fontSize = 40;
let improvisations = [];
let isListening = false;
let recognition = null;
let highlightedWords = [];
let transcript = "";
let silenceTimer = null;

function getLines() {
  const char = characters.find(c => c.id === selectedCharId);
  if (!char) return [];
  const base = scriptLines.filter(l => l.character === char.name);
  const improvLines = improvisations.map(i => ({id:i.id,character:char.name,text:i.text,act:0,scene:0}));
  return [...base, ...improvLines];
}

function render() {
  renderChars();
  renderMobileChars();
  renderStage();
  renderProgress();
}

function renderChars() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = characters.map(c => `
    <button class="char-btn ${c.id===selectedCharId?'active':''}"
      style="${c.id===selectedCharId?`background:${c.color};`:''}"
      onclick="selectChar('${c.id}')">${c.displayName}</button>
  `).join('');
}

function renderMobileChars() {
  const scroll = document.getElementById('charScroll');
  scroll.innerHTML = characters.map(c => `
    <button class="char-pill ${c.id===selectedCharId?'active':''}"
      style="${c.id===selectedCharId?`background:${c.color};`:''}"
      onclick="selectChar('${c.id}')">${c.displayName}</button>
  `).join('');
  // auto-scroll active pill into view
  setTimeout(() => {
    const active = scroll.querySelector('.active');
    if (active) active.scrollIntoView({inline:'center',block:'nearest'});
  }, 50);
}

function renderStage() {
  const lines = getLines();
  const line = lines[currentIdx];
  const card = document.getElementById('card');
  if (!line) {
    card.innerHTML = '<div class="empty-state">Selecione um personagem para começar</div>';
    return;
  }
  const ns = Math.round(fontSize * 0.7);
  const noteS = Math.round(fontSize * 0.5);
  card.innerHTML = `
    <div class="char-name" style="font-size:${ns}px">${line.character}</div>
    <div class="line-text" style="font-size:${fontSize}px">${renderText(line.text)}</div>
    ${line.notes?`<div class="stage-note" style="font-size:${noteS}px">${line.notes}</div>`:''}
    ${transcript?`<div class="transcript-bar"><strong>🎤</strong> ${transcript}</div>`:''}
  `;
}

function renderText(text) {
  return text.split('\n').map(line => {
    const words = line.split(/\s+/).filter(w=>w);
    return '<div style="margin-bottom:6px">' + words.map(w => {
      const clean = w.toLowerCase().replace(/[.,!?;:"""]/g,'');
      const hl = highlightedWords.some(hw => clean.includes(hw)||hw.includes(clean));
      return `<span class="word${hl?' hl':''}">${w}</span>`;
    }).join('') + '</div>';
  }).join('');
}

function renderProgress() {
  const lines = getLines();
  const total = lines.length;
  const pct = total ? Math.round((currentIdx/Math.max(total-1,1))*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = `${currentIdx+1} / ${total}`;
  const atStart = currentIdx===0;
  const atEnd = currentIdx>=total-1;
  document.getElementById('btnPrev').disabled = atStart;
  document.getElementById('btnNext').disabled = atEnd;
  document.getElementById('mBtnPrev').disabled = atStart;
  document.getElementById('mBtnNext').disabled = atEnd;
}

function selectChar(id) {
  selectedCharId = id; currentIdx = 0; highlightedWords = []; transcript = '';
  render();
}
function prevLine() {
  if (currentIdx>0){currentIdx--;highlightedWords=[];transcript='';render();}
}
function nextLine() {
  const lines=getLines();
  if(currentIdx<lines.length-1){currentIdx++;highlightedWords=[];transcript='';render();}
}
function resetScript() {
  currentIdx=0;highlightedWords=[];transcript='';
  if(isListening)stopMic();
  render();
}
function changeFontSize(v) {
  fontSize=parseInt(v);
  document.getElementById('fontLabel').textContent=v+'px';
  renderStage();
}

function addImprov() {
  const input=document.getElementById('improvInput');
  const text=input.value.trim();
  if(!text)return;
  improvisations.push({id:'improv-'+Date.now(),text});
  input.value='';
  renderImprovList();renderProgress();
}
function removeImprov(id) {
  improvisations=improvisations.filter(i=>i.id!==id);
  renderImprovList();renderProgress();
}
function renderImprovList() {
  const list=document.getElementById('improvList');
  if(!improvisations.length){
    list.innerHTML='<div style="font-size:12px;color:var(--text-dim);text-align:center;margin-top:6px">Nenhuma improvisação</div>';
    return;
  }
  list.innerHTML=improvisations.map(i=>`
    <div class="improv-item">
      <div class="improv-text">${i.text}</div>
      <button class="improv-del" onclick="removeImprov('${i.id}')">×</button>
    </div>
  `).join('');
}
document.getElementById('improvInput').addEventListener('keydown',e=>{if(e.key==='Enter')addImprov();});

function toggleMic(){isListening?stopMic():startMic();}
function startMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showStatus('error','⚠️ Navegador não suporta reconhecimento de voz');return;}
  recognition=new SR();
  recognition.lang='pt-BR';recognition.continuous=true;recognition.interimResults=true;
  recognition.onresult=e=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal)final+=t+' ';else interim+=t;
    }
    const spoken=(final||interim).trim();
    transcript=spoken;highlightWords(spoken);renderStage();
    if(final){clearTimeout(silenceTimer);silenceTimer=setTimeout(()=>{transcript='';highlightedWords=[];renderStage();},3000);}
  };
  recognition.onerror=e=>{if(e.error==='aborted'||e.error==='no-speech')return;showStatus('error','⚠️ Erro: '+e.error);stopMic();};
  recognition.onend=()=>{if(isListening)setTimeout(()=>{try{recognition.start();}catch(e){}},300);};
  recognition.start();
  isListening=true;
  setMicActive(true);
  showStatus('listening','🎤 Escutando...');
}
function stopMic(){
  isListening=false;
  if(recognition){try{recognition.abort();}catch(e){}recognition=null;}
  setMicActive(false);hideStatus();
}
function setMicActive(on){
  document.getElementById('btnMic').className='btn btn-mic'+(on?' active':'');
  document.getElementById('btnMic').textContent=on?'🔴 Parar':'🎤 Escutar';
  document.getElementById('mBtnMic').className='nav-btn nav-btn-mic'+(on?' active':'');
  document.getElementById('mBtnMic').textContent=on?'🔴':'🎤';
}
function highlightWords(spoken){
  const lines=getLines();const line=lines[currentIdx];if(!line)return;
  const words=spoken.toLowerCase().split(/\s+/).filter(w=>w.length>1);
  const lineWords=line.text.toLowerCase().split(/\s+/);
  highlightedWords=words.filter(w=>lineWords.some(lw=>lw.includes(w)||w.includes(lw)));
}
function showStatus(type,msg){
  const bar=document.getElementById('statusBar');
  bar.className='status-bar '+type;
  document.getElementById('statusText').textContent=msg;
}
function hideStatus(){document.getElementById('statusBar').className='status-bar';}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();nextLine();}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();prevLine();}
  if(e.key===' '){e.preventDefault();toggleMic();}
});

render();
</script>
