<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teatro Teleprompter — Auto da Compadecida</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08091a;
    --surface: #0f1225;
    --surface2: #161930;
    --accent: #ff8c42;
    --accent2: #ff6b35;
    --text: #f0e6d3;
    --text-dim: #8a7d6e;
    --border: rgba(255,140,66,0.25);
    --glow: rgba(255,140,66,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LAYOUT ── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    background: rgba(8,9,26,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 900;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .logo span { color: var(--text); font-weight: 400; font-size: 13px; display: block; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

  /* ── MAIN CONTENT ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0;
  }

  /* ── SIDEBAR ── */
  sidebar, .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow-y: auto;
    max-height: calc(100vh - 61px);
    position: sticky;
    top: 61px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  /* Character grid */
  .char-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .char-btn {
    padding: 8px 6px;
    border-radius: 8px;
    border: 2px solid transparent;
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    line-height: 1.2;
  }
  .char-btn:hover { border-color: var(--accent); color: var(--text); transform: scale(1.03); }
  .char-btn.active { color: #1a1a1a; font-weight: 700; border-color: rgba(255,255,255,0.4); }

  /* Controls */
  .controls { display: flex; flex-direction: column; gap: 10px; }
  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 6px; transition: all 0.2s;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #1a1a1a; }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn-mic { background: #1a3a5c; color: var(--text); border: 1px solid #2c5f8d; }
  .btn-mic.active { background: #5c1a1a; border-color: #ff6b35; animation: pulse-border 1.5s infinite; }
  @keyframes pulse-border { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,0.4)} 50%{box-shadow:0 0 0 6px rgba(255,107,53,0)} }
  .btn-danger { background: #3a1a1a; color: #ff6b35; border: 1px solid #5c2020; }
  .btn-danger:hover { background: #5c1a1a; }

  /* Font size */
  .font-control { display: flex; align-items: center; gap: 10px; }
  input[type=range] {
    flex: 1; height: 4px; border-radius: 2px; appearance: none;
    background: linear-gradient(to right, var(--accent), var(--accent2));
    outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    box-shadow: 0 0 8px rgba(255,140,66,0.5);
  }
  .font-label { font-size: 12px; color: var(--accent); font-weight: 700; min-width: 36px; text-align: right; }

  /* Progress */
  .progress-bar { background: var(--surface2); border-radius: 4px; height: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.3s; border-radius: 4px; }
  .progress-text { font-size: 11px; color: var(--text-dim); margin-top: 6px; text-align: center; }

  /* Improv */
  .improv-input-row { display: flex; gap: 6px; }
  .improv-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
  }
  .improv-input:focus { border-color: var(--accent); }
  .improv-input::placeholder { color: var(--text-dim); }
  .improv-list { display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto; }
  .improv-item {
    background: rgba(255,140,66,0.08); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; font-size: 12px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
  }
  .improv-text { flex: 1; line-height: 1.4; }
  .improv-del { background: none; border: none; color: #ff6b35; cursor: pointer; font-size: 16px; flex-shrink: 0; opacity: 0.7; }
  .improv-del:hover { opacity: 1; }

  /* ── TELEPROMPTER ── */
  .stage {
    background: var(--bg);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 40px;
    min-height: calc(100vh - 61px);
    position: relative;
    overflow: hidden;
  }
  .stage::before {
    content: '';
    position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(255,140,66,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .teleprompter-card {
    width: 100%; max-width: 900px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 52px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,140,66,0.08);
    position: relative;
    z-index: 1;
  }

  .char-name {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 8px rgba(255,140,66,0.3));
    transition: font-size 0.2s;
  }

  .line-text {
    line-height: 2.1;
    color: var(--text);
    padding: 32px 40px;
    background: rgba(255,140,66,0.04);
    border-radius: 12px;
    border: 1px solid rgba(255,140,66,0.12);
    box-shadow: inset 0 2px 12px rgba(0,0,0,0.3);
    min-height: 120px;
    transition: font-size 0.2s;
  }
  .line-text .word { display: inline-block; margin-right: 12px; margin-bottom: 4px; transition: all 0.2s; }
  .line-text .word.hl {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a1a1a; padding: 4px 10px; border-radius: 6px;
    font-weight: 900; transform: scale(1.05);
    box-shadow: 0 4px 12px rgba(255,107,53,0.4);
    animation: wordpulse 1s ease-in-out infinite;
  }
  @keyframes wordpulse { 0%,100%{opacity:1} 50%{opacity:0.85} }

  .stage-note {
    margin-top: 24px; padding: 14px 20px;
    background: rgba(255,140,66,0.06);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-style: italic; color: #c8a880;
    transition: font-size 0.2s;
  }

  .transcript-bar {
    margin-top: 20px; padding: 14px 20px;
    background: rgba(44,95,141,0.2);
    border: 1px solid #2c5f8d;
    border-radius: 10px; font-size: 13px; color: var(--text);
  }
  .transcript-bar strong { color: var(--accent); }

  .empty-state {
    text-align: center; color: var(--text-dim);
    font-size: 18px; opacity: 0.6;
  }

  /* Status bar */
  .status-bar {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    padding: 10px 24px; border-radius: 40px;
    font-size: 13px; font-weight: 600;
    display: none; align-items: center; gap: 8px;
    backdrop-filter: blur(12px);
    z-index: 200;
  }
  .status-bar.listening {
    display: flex; background: rgba(44,95,141,0.85);
    border: 1px solid #2c5f8d; color: #a0c4e8;
  }
  .status-bar.error {
    display: flex; background: rgba(92,26,26,0.85);
    border: 1px solid #ff6b35; color: #ff8c42;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Keyboard hint */
  .kbd-hint { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 6px; }
  kbd { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 10px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Responsive */
  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
    .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; z-index: 200; width: 300px; transition: left 0.3s; max-height: 100vh; }
    .sidebar.open { left: 0; }
    .stage { padding: 20px; min-height: calc(100vh - 61px); }
    .teleprompter-card { padding: 28px 24px; }
    .mobile-toggle { display: flex !important; }
  }
  .mobile-toggle { display: none; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text); cursor: pointer; font-size: 13px; font-weight: 600; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 190; }
  .overlay.open { display: block; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">🎭 Teatro Teleprompter <span>Auto da Compadecida</span></div>
    <button class="mobile-toggle" onclick="toggleSidebar()">☰ Controles</button>
  </header>
  <main>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">

      <!-- Personagem -->
      <div>
        <div class="section-title">👤 Personagem</div>
        <div class="char-grid" id="charGrid"></div>
      </div>

      <!-- Navegação -->
      <div>
        <div class="section-title">⚙️ Navegação</div>
        <div class="controls">
          <div class="btn-row">
            <button class="btn btn-primary" id="btnPrev" onclick="prevLine()">▲ Anterior</button>
            <button class="btn btn-primary" id="btnNext" onclick="nextLine()">▼ Próxima</button>
          </div>
          <div class="btn-row">
            <button class="btn btn-mic" id="btnMic" onclick="toggleMic()">🎤 Escutar</button>
            <button class="btn btn-secondary" onclick="resetScript()">↺ Reset</button>
          </div>
          <div class="kbd-hint"><kbd>←</kbd> anterior · <kbd>→</kbd> próxima · <kbd>Space</kbd> mic</div>
        </div>
      </div>

      <!-- Progresso -->
      <div>
        <div class="section-title">📊 Progresso</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="progress-text" id="progressText">0 / 0</div>
      </div>

      <!-- Fonte -->
      <div>
        <div class="section-title">🔤 Tamanho</div>
        <div class="font-control">
          <input type="range" min="24" max="64" value="40" id="fontRange" oninput="changeFontSize(this.value)">
          <div class="font-label" id="fontLabel">40px</div>
        </div>
      </div>

      <!-- Improvisações -->
      <div>
        <div class="section-title">🎭 Improvisações</div>
        <div class="improv-input-row">
          <input type="text" class="improv-input" id="improvInput" placeholder="Nova fala...">
          <button class="btn btn-primary" style="flex:0;padding:8px 12px" onclick="addImprov()">+</button>
        </div>
        <div class="improv-list" id="improvList">
          <div style="font-size:12px;color:var(--text-dim);text-align:center;margin-top:8px">Nenhuma improvisação</div>
        </div>
      </div>

    </div>

    <!-- Stage -->
    <div class="stage">
      <div class="teleprompter-card" id="card">
        <div class="empty-state">Selecione um personagem para começar</div>
      </div>
    </div>
  </main>
</div>

<div class="status-bar" id="statusBar">
  <div class="status-dot"></div>
  <span id="statusText">🎤 Escutando...</span>
</div>

<script>

// ── STATE ──
let selectedCharId = "joao";
let currentIdx = 0;
let fontSize = 40;
let improvisations = [];
let isListening = false;
let recognition = null;
let highlightedWords = [];
let transcript = "";
let silenceTimer = null;

function getCharacterLines(charId) {
  const char = characters.find(c => c.id === charId);
  if (!char) return [];
  const base = scriptLines.filter(l => l.character === char.name);
  const improvLines = improvisations.map(i => ({
    id: i.id, character: char.name, text: i.text, act: 0, scene: 0
  }));
  return [...base, ...improvLines];
}

// ── RENDER ──
function render() {
  renderChars();
  renderStage();
  renderProgress();
}

function renderChars() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = characters.map(c => `
    <button class="char-btn ${c.id === selectedCharId ? 'active' : ''}"
      style="${c.id === selectedCharId ? `background:${c.color};` : ''}"
      onclick="selectChar('${c.id}')"
      title="${c.description}">
      ${c.displayName}
    </button>
  `).join('');
}

function renderStage() {
  const lines = getCharacterLines(selectedCharId);
  const line = lines[currentIdx];
  const char = characters.find(c => c.id === selectedCharId);
  const card = document.getElementById('card');

  if (!line) {
    card.innerHTML = '<div class="empty-state">Selecione um personagem para começar</div>';
    return;
  }

  const nameSize = Math.round(fontSize * 0.75);
  const noteSize = Math.round(fontSize * 0.55);

  card.innerHTML = `
    <div class="char-name" style="font-size:${nameSize}px">${line.character}</div>
    <div class="line-text" style="font-size:${fontSize}px">${renderText(line.text)}</div>
    ${line.notes ? `<div class="stage-note" style="font-size:${noteSize}px">${line.notes}</div>` : ''}
    ${transcript ? `<div class="transcript-bar"><strong>🎤 Reconhecido:</strong> ${transcript}</div>` : ''}
  `;
}

function renderText(text) {
  return text.split('\n').map(line => {
    const words = line.split(/\s+/).filter(w => w);
    const spans = words.map(w => {
      const clean = w.toLowerCase().replace(/[.,!?;:"""]/g, '');
      const hl = highlightedWords.some(hw => clean.includes(hw) || hw.includes(clean));
      return `<span class="word ${hl ? 'hl' : ''}">${w}</span>`;
    }).join('');
    return `<div style="margin-bottom:8px">${spans}</div>`;
  }).join('');
}

function renderProgress() {
  const lines = getCharacterLines(selectedCharId);
  const total = lines.length;
  const pct = total ? Math.round((currentIdx / Math.max(total - 1, 1)) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${currentIdx + 1} / ${total}`;
  document.getElementById('btnPrev').disabled = currentIdx === 0;
  document.getElementById('btnNext').disabled = currentIdx >= total - 1;
}

// ── ACTIONS ──
function selectChar(id) {
  selectedCharId = id;
  currentIdx = 0;
  highlightedWords = [];
  transcript = '';
  render();
}

function prevLine() {
  if (currentIdx > 0) { currentIdx--; highlightedWords = []; transcript = ''; render(); }
}

function nextLine() {
  const lines = getCharacterLines(selectedCharId);
  if (currentIdx < lines.length - 1) { currentIdx++; highlightedWords = []; transcript = ''; render(); }
}

function resetScript() {
  currentIdx = 0; highlightedWords = []; transcript = '';
  if (isListening) stopMic();
  render();
}

function changeFontSize(v) {
  fontSize = parseInt(v);
  document.getElementById('fontLabel').textContent = v + 'px';
  renderStage();
}

// ── IMPROV ──
function addImprov() {
  const input = document.getElementById('improvInput');
  const text = input.value.trim();
  if (!text) return;
  improvisations.push({ id: 'improv-' + Date.now(), text });
  input.value = '';
  renderImprovList();
  renderProgress();
}

function removeImprov(id) {
  improvisations = improvisations.filter(i => i.id !== id);
  renderImprovList();
  renderProgress();
}

function renderImprovList() {
  const list = document.getElementById('improvList');
  if (improvisations.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text-dim);text-align:center;margin-top:8px">Nenhuma improvisação</div>';
    return;
  }
  list.innerHTML = improvisations.map(i => `
    <div class="improv-item">
      <div class="improv-text">${i.text}</div>
      <button class="improv-del" onclick="removeImprov('${i.id}')">×</button>
    </div>
  `).join('');
}

document.getElementById('improvInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addImprov();
});

// ── SPEECH ──
function toggleMic() { isListening ? stopMic() : startMic(); }

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showStatus('error', '⚠️ Navegador não suporta reconhecimento de voz'); return; }

  recognition = new SR();
  recognition.lang = 'pt-BR';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t + ' ';
      else interim += t;
    }
    const spoken = (final || interim).trim();
    transcript = spoken;
    highlightWords(spoken);
    renderStage();

    if (final) {
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => { transcript = ''; highlightedWords = []; renderStage(); }, 3000);
    }
  };

  recognition.onerror = e => {
    if (e.error === 'aborted' || e.error === 'no-speech') return;
    showStatus('error', '⚠️ Erro: ' + e.error);
    stopMic();
  };

  recognition.onend = () => {
    if (isListening) setTimeout(() => { try { recognition.start(); } catch(e){} }, 300);
  };

  recognition.start();
  isListening = true;
  document.getElementById('btnMic').className = 'btn btn-mic active';
  document.getElementById('btnMic').textContent = '🔴 Parar';
  showStatus('listening', '🎤 Escutando...');
}

function stopMic() {
  isListening = false;
  if (recognition) { try { recognition.abort(); } catch(e){} recognition = null; }
  document.getElementById('btnMic').className = 'btn btn-mic';
  document.getElementById('btnMic').textContent = '🎤 Escutar';
  hideStatus();
}

function highlightWords(spoken) {
  const lines = getCharacterLines(selectedCharId);
  const line = lines[currentIdx];
  if (!line) return;
  const words = spoken.toLowerCase().split(/\s+/).filter(w => w.length > 1);
  const lineWords = line.text.toLowerCase().split(/\s+/);
  highlightedWords = words.filter(w => lineWords.some(lw => lw.includes(w) || w.includes(lw)));
}

// ── STATUS ──
function showStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar ' + type;
  document.getElementById('statusText').textContent = msg;
}
function hideStatus() {
  document.getElementById('statusBar').className = 'status-bar';
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextLine(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevLine(); }
  if (e.key === ' ') { e.preventDefault(); toggleMic(); }
});

// ── MOBILE SIDEBAR ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

// ── INIT ──
render();
</script>
